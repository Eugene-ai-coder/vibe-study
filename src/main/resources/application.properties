spring.application.name=vibe-study
server.port=8080

# H2 File Database (프로젝트 루트 /data 폴더에 저장)
spring.datasource.url=jdbc:h2:file:./data/vibedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (브라우저에서 DB 확인: http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# SQL Init (schema.sql → JPA DDL → data.sql 순서 보장)
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Session
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# Pagination
spring.data.web.pageable.max-page-size=100

# Jackson - LocalDate를 ISO 문자열("2024-02-24")로 직렬화
spring.jackson.serialization.write-dates-as-timestamps=false

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
