spring.application.name=vibe-study
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/vibedb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=vibeuser
spring.datasource.password=vibe1234

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# SQL Init (schema.sql → JPA DDL → data.sql 순서 보장)
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Session
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# Pagination
spring.data.web.pageable.max-page-size=100

# Jackson - LocalDate를 ISO 문자열("2024-02-24")로 직렬화
spring.jackson.serialization.write-dates-as-timestamps=false

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
